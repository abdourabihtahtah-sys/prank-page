<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SECURITY CONTROL SYSTEM</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ff66;
    font-family:"Courier New", monospace;
    overflow:hidden;
}

#top{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:#0b0b0b;
    padding:10px;
    border-bottom:1px solid #00ff66;
    display:flex;
    justify-content:space-between;
    font-size:12px;
}

#bar{
    width:100%;
    height:6px;
    background:#111;
}

#progress{
    width:0%;
    height:6px;
    background:#00ff66;
}

#scan{
    padding:20px;
    font-size:15px;
    line-height:1.8;
    white-space:pre-wrap;
}

#final{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

#final h1{
    color:#00ff66;
    font-size:42px;
}

#final p{
    color:white;
    font-size:20px;
}

.big{
    font-size:95px;
}
</style>
</head>

<body>

<div id="top">
    <div>SYSTEM v12 ACTIVE</div>
    <div id="status">0%</div>
</div>

<div id="bar">
    <div id="progress"></div>
</div>

<div id="scan"></div>

<div id="final">
    <div class="big">😂</div>
    <h1>تم الاختراق بنجاح!</h1>
    <p>تم فحص الجهاز بالكامل...</p>
    <p style="color:#00ff66;font-weight:bold;">عبد ربه يمزح معك 😎</p>
</div>

<script>

const logs = [
"Initializing secure connection...",
"Loading encryption modules...",
"Bypassing firewall...",
"Accessing system kernel...",
"Scanning storage...",
"Found images: 4,102",
"Found messages: 18,903",
"Analyzing apps...",
"Deep scan activated...",
"Checking hidden partitions...",
"Encrypting report...",
"Uploading anonymous data...",
"Final check...",
"System compromise: FALSE",
"Operation completed"
];

let i = 0;
let scan = document.getElementById("scan");
let progress = document.getElementById("progress");
let status = document.getElementById("status");

function start(){
    if(i < logs.length){

        scan.innerHTML += ">> " + logs[i] + "\n";

        progress.style.width = ((i+1)/logs.length)*100 + "%";

        status.innerHTML = Math.floor(((i+1)/logs.length)*100) + "%";

        i++;

        setTimeout(start, 450 + Math.random()*400);

    }else{
        setTimeout(()=>{
            document.getElementById("final").style.display="flex";
        },1200);
    }
}

start();

</script>

</body>
</html>
