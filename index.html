<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Security Scan</title>

<style>
body{
    margin:0;
    background:#000;
    color:#00ff88;
    font-family: "Courier New", monospace;
    overflow:hidden;
}

#terminal{
    padding:20px;
    font-size:15px;
    line-height:1.7;
    white-space:pre-wrap;
}

.glow{
    text-shadow:0 0 8px #00ff88;
}

#bar{
    width:90%;
    height:20px;
    border:1px solid #00ff88;
    margin:20px;
    position:relative;
}

#progress{
    height:100%;
    width:0%;
    background:#00ff88;
}

#final{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

#final h1{
    color:#00ff88;
    font-size:40px;
    margin:10px;
}

#final p{
    color:#fff;
    font-size:20px;
}

.big{
    font-size:90px;
}
</style>
</head>

<body>

<div id="terminal" class="glow"></div>

<div id="bar">
    <div id="progress"></div>
</div>

<div id="final">
    <div class="big">😂</div>
    <h1>تم الانتهاء من الفحص!</h1>
    <p>لا تقلق، لا يوجد أي اختراق حقيقي</p>
    <p><strong>عبد ربه يمزح معك 😎</strong></p>
</div>

<script>

const messages = [
"🔐 بدء الاتصال بالنظام...",
"✔ تم تجاوز جدار الحماية",
"✔ تحليل الجهاز...",
"✔ الوصول إلى الملفات المخفية",
"📂 صور: 1,284 ملف",
"📱 رسائل: 9,431 رسالة",
"💾 بيانات التطبيقات: قيد الفحص",
"⚠ تم اكتشاف نشاط مشبوه...",
"🔍 إعادة التحقق...",
"✔ النظام آمن نسبياً",
"🚀 بدء رفع التقرير...",
"⏳ جاري المعالجة..."
];

let t = 0;
let terminal = document.getElementById("terminal");
let progress = document.getElementById("progress");

function type(){
    if(t < messages.length){
        terminal.innerHTML += messages[t] + "\n";
        t++;

        progress.style.width = (t/messages.length)*100 + "%";

        setTimeout(type, 800);
    }else{
        setTimeout(()=>{
            document.getElementById("final").style.display="flex";
        },1500);
    }
}

type();

</script>

</body>
</html>
