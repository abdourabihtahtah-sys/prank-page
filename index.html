<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLACK OPS - HOLLYWOOD SIM</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ff66;
    font-family: monospace;
    overflow:hidden;
}

/* شاشة البداية السينمائية */
#intro{
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    background:black;
}

.title{
    font-size:28px;
    letter-spacing:2px;
}

button{
    margin-top:20px;
    padding:16px 30px;
    font-size:18px;
    background:#00ff66;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

/* شريط السينما */
#cinemaBar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:4px;
    background:#111;
}

#fill{
    width:0%;
    height:100%;
    background:#00ff66;
}

/* الشاشة الرئيسية */
#terminal{
    display:none;
    padding:20px;
    white-space:pre-wrap;
    line-height:1.8;
}

/* HUD */
#hud{
    position:fixed;
    top:10px;
    right:10px;
    font-size:12px;
    opacity:0.7;
}

/* خريطة سينمائية */
#map{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:radial-gradient(circle,#003300,#000);
    padding:20px;
}

/* النهاية */
#end{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

.big{
    font-size:110px;
}

/* اهتزاز سينمائي */
.shake{
    animation: shake 0.08s infinite;
}

@keyframes shake{
    0%{transform:translate(0,0);}
    25%{transform:translate(2px,-2px);}
    50%{transform:translate(-2px,2px);}
    75%{transform:translate(1px,1px);}
    100%{transform:translate(0,0);}
}

/* وميض سينمائي */
.glow{
    text-shadow:0 0 10px #00ff66;
}
</style>
</head>

<body>

<div id="hud">SYSTEM: ACTIVE • CLASSIFIED</div>

<div id="cinemaBar"><div id="fill"></div></div>

<!-- INTRO -->
<div id="intro">
    <div class="title glow">🎬 BLACK OPS - HOLLYWOOD SIMULATION</div>
    <p>CLASSIFIED ACCESS REQUIRED</p>
    <button onclick="start()">INITIATE SEQUENCE</button>
</div>

<!-- TERMINAL -->
<div id="terminal"></div>

<!-- MAP -->
<div id="map">
    <h2>🌍 GLOBAL TRACE NETWORK</h2>
    <p>IP LOCATION: MOROCCO 🇲🇦</p>
    <p>SATELLITE LINK: ACTIVE</p>
    <p>DEVICE SIGNAL: STABLE</p>
    <p>AI ANALYSIS: RUNNING...</p>
</div>

<!-- END -->
<div id="end">
    <div class="big">😆</div>
    <h1>MISSION COMPLETE</h1>
    <p>كل ما شاهدته مجرد محاكاة سينمائية</p>
    <p><b>عبد ربه يمزح معك 😎</b></p>
</div>

<script>

function start(){

    document.getElementById("intro").style.display="none";

    let fill = document.getElementById("fill");
    let p = 0;

    let load = setInterval(()=>{

        p += 1;
        fill.style.width = p + "%";

        if(p % 15 === 0){
            document.body.classList.add("shake");
            setTimeout(()=>document.body.classList.remove("shake"),120);
        }

        if(p >= 100){
            clearInterval(load);
            run();
        }

    },35);
}

function run(){

    document.getElementById("terminal").style.display="block";

    let logs = [
        "[HOLLYWOOD SIM] initializing black ops engine...",
        "connecting satellite network...",
        "bypassing global firewall...",
        "decrypting classified files...",
        "accessing intelligence database...",
        "scanning device memory...",
        "photos indexed: 6,231",
        "messages indexed: 28,104",
        "AI behavioral scan: ACTIVE",
        "tracking signal source...",
        "geo-location triangulation...",
        "security breach simulation: 94%",
        "launching live visualization...",
        "FINAL PHASE STARTED"
    ];

    let i = 0;
    let box = document.getElementById("terminal");

    let interval = setInterval(()=>{

        box.innerHTML += ">> " + logs[i] + "\n";

        if(i % 2 === 0){
            document.body.classList.add("shake");
            setTimeout(()=>document.body.classList.remove("shake"),100);
        }

        if(i === 5){
            document.getElementById("map").style.display="block";
        }

        i++;

        if(i >= logs.length){
            clearInterval(interval);

            setTimeout(()=>{
                document.getElementById("terminal").style.display="none";
                document.getElementById("map").style.display="none";
                document.getElementById("end").style.display="flex";
            },2000);
        }

    },300);
}

</script>

</body>
</html>
