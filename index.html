<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIA CINEMATIC SYSTEM</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ff66;
    font-family: monospace;
    overflow:hidden;
}

#load{
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

#barBox{
    width:85%;
    height:10px;
    border:1px solid #00ff66;
    margin-top:20px;
}

#bar{
    width:0%;
    height:100%;
    background:#00ff66;
}

#terminal{
    display:none;
    padding:20px;
    white-space:pre-wrap;
    line-height:1.8;
}

#end{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

.big{
    font-size:100px;
}

/* اهتزاز قوي */
.shake{
    animation: shake 0.08s infinite;
}

@keyframes shake{
    0%{transform:translate(0,0);}
    25%{transform:translate(3px,2px);}
    50%{transform:translate(-3px,2px);}
    75%{transform:translate(2px,-3px);}
    100%{transform:translate(0,0);}
}
</style>
</head>

<body>

<!-- 🔊 أصوات -->
<audio id="alarm" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>
<audio id="laugh" src="https://www.myinstants.com/media/sounds/evil-laugh.mp3"></audio>
<audio id="hack" src="https://www.soundjay.com/mechanical/sounds/keyboard-typing-2.mp3"></audio>

<!-- التحميل -->
<div id="load">
    <h2>INITIALIZING CIA CORE SYSTEM...</h2>
    <div id="barBox"><div id="bar"></div></div>
</div>

<!-- التيرمينال -->
<div id="terminal"></div>

<!-- النهاية -->
<div id="end">
    <div class="big">😅</div>
    <h1>ACCESS GRANTED</h1>
    <p>⚠ تم اختراق النظام بنجاح... لكن كل شيء مجرد مزحة 😂</p>
    <p><b>عبد ربه يمزح معك 😎</b></p>
</div>

<script>

let alarm = document.getElementById("alarm");
let laugh = document.getElementById("laugh");
let hack = document.getElementById("hack");

window.onload = function(){
    start();
};

function vibrate(){
    if(navigator.vibrate){
        navigator.vibrate([200,100,200]);
    }
}

function start(){

    alarm.play();
    vibrate();

    let bar = document.getElementById("bar");
    let p = 0;

    let load = setInterval(()=>{

        p++;
        bar.style.width = p + "%";

        if(p % 15 === 0){
            document.body.classList.add("shake");
            setTimeout(()=>document.body.classList.remove("shake"),120);
            vibrate();
        }

        if(p >= 100){
            clearInterval(load);
            runTerminal();
        }

    },35);
}

function runTerminal(){

    document.getElementById("load").style.display="none";
    document.getElementById("terminal").style.display="block";

    let logs = [
        "[CIA] secure channel opened...",
        "bypassing firewall level 1...",
        "bypassing firewall level 2...",
        "injecting black ops script...",
        "scanning device memory...",
        "photos indexed: 7,120",
        "messages indexed: 31,004",
        "tracking signal...",
        "decrypting storage...",
        "AI analysis running...",
        "system breach simulation: 97%",
        "FINAL STAGE ACTIVATED"
    ];

    let i = 0;
    let box = document.getElementById("terminal");

    let interval = setInterval(()=>{

        hack.play();

        box.innerHTML += ">> " + logs[i] + "\n";

        if(i % 2 === 0){
            document.body.classList.add("shake");
            vibrate();
            setTimeout(()=>document.body.classList.remove("shake"),100);
        }

        i++;

        if(i >= logs.length){
            clearInterval(interval);

            setTimeout(()=>{
                document.getElementById("terminal").style.display="none";
                document.getElementById("end").style.display="flex";

                laugh.play();
                vibrate();

            },1500);
        }

    },280);
}

</script>

</body>
</html>
