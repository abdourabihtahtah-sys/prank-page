<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SECURE TERMINAL</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ff66;
    font-family:"Courier New", monospace;
    overflow:hidden;
}

#scan{
    padding:20px;
    font-size:15px;
    line-height:1.8;
    white-space:pre-wrap;
}

#top{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:#0a0a0a;
    padding:8px;
    border-bottom:1px solid #00ff66;
    display:flex;
    justify-content:space-between;
    font-size:12px;
}

#bar{
    width:100%;
    height:6px;
    background:#111;
}

#progress{
    width:0%;
    height:6px;
    background:#00ff66;
}

#final{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

#final h1{
    color:#00ff66;
    font-size:40px;
}

#final p{
    color:white;
    font-size:20px;
}

.big{
    font-size:90px;
}
</style>
</head>

<body>

<div id="top">
    <div>SECURE SYSTEM v10</div>
    <div id="status">LOADING...</div>
</div>

<div id="bar">
    <div id="progress"></div>
</div>

<div id="scan"></div>

<div id="final">
    <div class="big">😂</div>
    <h1>تمت العملية!</h1>
    <p>لا يوجد أي اختراق حقيقي</p>
    <p><strong>عبد ربه يمزح معك 😎</strong></p>
</div>

<script>

const logs = [
"Connecting to secure node...",
"Bypassing security layer 1...",
"Bypassing security layer 2...",
"Scanning system files...",
"Found images: 3,214",
"Found messages: 11,908",
"Analyzing applications...",
"Checking hidden folders...",
"Running deep scan...",
"Encrypting report...",
"System status: SAFE",
"Finalizing..."
];

let i = 0;
let scan = document.getElementById("scan");
let progress = document.getElementById("progress");
let status = document.getElementById("status");

function run(){
    if(i < logs.length){

        scan.innerHTML += ">> " + logs[i] + "\n";

        progress.style.width = ((i+1)/logs.length)*100 + "%";

        status.innerHTML = Math.floor(((i+1)/logs.length)*100) + "%";

        i++;

        setTimeout(run, 500 + Math.random()*400);

    }else{
        setTimeout(()=>{
            document.getElementById("final").style.display="flex";
        },1200);
    }
}

run();

</script>

</body>
</html>
