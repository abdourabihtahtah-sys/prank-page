<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIA CINEMATIC SYSTEM</title>

<style>
body{
    margin:0;
    background:black;
    color:#00ff66;
    font-family: monospace;
    overflow:hidden;
}

/* تحميل */
#load{
    position:fixed;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* شريط */
#barBox{
    width:85%;
    height:10px;
    border:1px solid #00ff66;
    margin-top:20px;
}

#bar{
    width:0%;
    height:100%;
    background:#00ff66;
}

/* التيرمينال */
#terminal{
    display:none;
    padding:20px;
    white-space:pre-wrap;
    line-height:1.8;
}

/* النهاية */
#end{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

.big{
    font-size:100px;
}

/* اهتزاز */
.shake{
    animation: shake 0.08s infinite;
}

@keyframes shake{
    0%{transform:translate(0,0);}
    25%{transform:translate(3px,2px);}
    50%{transform:translate(-3px,2px);}
    75%{transform:translate(2px,-3px);}
    100%{transform:translate(0,0);}
}

/* 🔒 شاشة القفل */
#lockScreen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    color:red;
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    z-index:9999;
    font-family:monospace;
}
</style>
</head>

<body>

<!-- 🔊 أصوات -->
<audio id="alarm" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>
<audio id="laugh" src="https://www.myinstants.com/media/sounds/evil-laugh.mp3"></audio>
<audio id="hack" src="https://www.soundjay.com/mechanical/sounds/keyboard-typing-2.mp3"></audio>

<!-- التحميل -->
<div id="load">
    <h2>INITIALIZING CIA CORE SYSTEM...</h2>
    <div id="barBox"><div id="bar"></div></div>
</div>

<!-- التيرمينال -->
<div id="terminal"></div>

<!-- النهاية -->
<div id="end">
    <div class="big">😂</div>
    <h1>ACCESS GRANTED</h1>
    <p>⚠ تم اختراق النظام بنجاح... لكن كل شيء مجرد مزحة 😂</p>
    <p><b>عبد ربه يمزح معك 😎</b></p>
</div>

<!-- 🔒 LOCK SCREEN -->
<div id="lockScreen">
    <div style="font-size:100px;">🔒</div>
    <h1>DEVICE LOCKED</h1>
    <p>⚠ SYSTEM CONTROL ACTIVE ⚠</p>
    <p>ACCESS RESTRICTED</p>
</div>

<script>

let alarm = document.getElementById("alarm");
let laugh = document.getElementById("laugh");
let hack = document.getElementById("hack");

window.onload = function(){
    start();
};

function vibrate(pattern = [200,100,200]){
    if(navigator.vibrate){
        navigator.vibrate(pattern);
    }
}

function flash(){
    document.body.style.filter = "brightness(2)";
    setTimeout(()=>document.body.style.filter="brightness(1)",120);
}

function start(){

    alarm.play();
    vibrate([300,150,300]);

    let bar = document.getElementById("bar");
    let p = 0;

    let load = setInterval(()=>{

        p++;
        bar.style.width = p + "%";

        if(p % 12 === 0){
            document.body.classList.add("shake");
            setTimeout(()=>document.body.classList.remove("shake"),120);
            vibrate([150,80,150]);
            flash();
        }

        if(p >= 100){
            clearInterval(load);
            runTerminal();
        }

    },30);
}

function runTerminal(){

    document.getElementById("load").style.display="none";
    document.getElementById("terminal").style.display="block";

    let logs = [
        "[CIA] establishing secure quantum tunnel...",
        "bypassing multi-layer firewall...",
        "node injection: 12 active routes",
        "kernel access granted...",
        "deep memory scan initiated...",
        "hidden cache detected...",
        "decrypting protected sectors...",
        "AI behavioral model running...",
        "⚠ anomaly detected in network stream...",
        "re-routing global signal...",
        "system integrity dropping...",
        "⚠ intrusion countermeasures disabled...",
        "FINAL OVERRIDE SEQUENCE INITIATED...",
        "ACCESSING CORE SYSTEM...",
        "SYSTEM COMPROMISE: 99%",
        "FINAL STAGE ACTIVATED"
    ];

    let i = 0;
    let box = document.getElementById("terminal");

    let interval = setInterval(()=>{

        hack.play();

        box.innerHTML += ">> " + logs[i] + "\n";
        box.scrollTop = box.scrollHeight;

        if(i % 2 === 0){
            document.body.classList.add("shake");
            vibrate([120,60,120]);
            setTimeout(()=>document.body.classList.remove("shake"),90);
        }

        if(logs[i] && logs[i].includes("FINAL")){
            flash();
            vibrate([400,200,400]);
        }

        i++;

        if(i >= logs.length){
            clearInterval(interval);

            setTimeout(()=>{

                document.getElementById("terminal").style.display="none";
                document.getElementById("end").style.display="flex";

                laugh.play();
                vibrate([500,200,500]);

                setTimeout(()=>{
                    document.getElementById("lockScreen").style.display="flex";
                    document.body.classList.add("shake");
                    flash();
                    vibrate([600,300,600]);
                    alarm.play();
                }, 2000);

            },1200);
        }

    },220);
}

</script>

</body>
</html>
